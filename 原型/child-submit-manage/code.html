<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed": "#001e2b",
              "secondary": "#8b5000",
              "on-tertiary-container": "#634100",
              "surface": "#f8f9fb",
              "on-surface-variant": "#3e484f",
              "surface-container-high": "#e6e8ea",
              "inverse-on-surface": "#eff1f3",
              "on-secondary-fixed": "#2c1600",
              "surface-variant": "#e0e3e5",
              "primary": "#006688",
              "on-background": "#191c1e",
              "on-secondary-fixed-variant": "#693c00",
              "secondary-container": "#ff9800",
              "tertiary": "#7c5716",
              "error": "#ba1a1a",
              "on-error": "#ffffff",
              "surface-container": "#eceef0",
              "tertiary-container": "#dfaf66",
              "surface-container-low": "#f2f4f6",
              "on-surface": "#191c1e",
              "error-container": "#ffdad6",
              "primary-container": "#4fc3f7",
              "surface-container-highest": "#e0e3e5",
              "on-tertiary-fixed": "#281800",
              "tertiary-fixed": "#ffddb0",
              "inverse-surface": "#2d3133",
              "inverse-primary": "#75d1ff",
              "on-primary-fixed-variant": "#004d67",
              "on-primary-container": "#004e69",
              "on-primary": "#ffffff",
              "surface-bright": "#f8f9fb",
              "on-tertiary-fixed-variant": "#614000",
              "surface-dim": "#d8dadc",
              "secondary-fixed-dim": "#ffb870",
              "on-secondary-container": "#653900",
              "surface-tint": "#006688",
              "outline-variant": "#bdc8d0",
              "background": "#f8f9fb",
              "on-secondary": "#ffffff",
              "primary-fixed": "#c2e8ff",
              "on-tertiary": "#ffffff",
              "on-error-container": "#93000a",
              "outline": "#6e7980",
              "primary-fixed-dim": "#75d1ff",
              "tertiary-fixed-dim": "#f0be74",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#ffdcbe"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.bouncy-card {
    transform: rotate(-1deg)
    }
.bouncy-card:nth-child(even) {
    transform: rotate(1deg)
    }
.noise-texture {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDK2x_nyLyrWWOjr_9Y0eK1fBE8Fhpc1vd-mYnuFSdh3wstsDinMv65TevZVmd8RjbuGi5shmFYNJ959D8Gj0aGus5Yfo60sO_cJYD5FvSdllJV45ddSKoUAbejbkXo8F6coUdT8vYu5JTGYdzmj8sLGlvGZDmTjVmZnyQTCSETQO5OD4-DhNZAPEvAa63BOHEptqMzxXVzyPe2o4t-oiQBcDCxM0UzgZ_nXsCEHeTq3ShMm7mwOtZAc39CvQtMQMP-wICIGGbjzxZY);
    opacity: 0.03;
    pointer-events: none
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary-container">
<!-- Noise Texture Overlay -->
<div class="fixed inset-0 noise-texture z-[100]"></div>
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-16 bg-orange-50/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-orange-100 dark:hover:bg-orange-900/30 transition-colors active:scale-95 duration-200 text-orange-600 dark:text-orange-400">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="ml-2 font-headline font-bold text-lg text-orange-800 dark:text-orange-200">我的审核</h1>
</header>
<main class="pt-20 px-6 max-w-2xl mx-auto pb-12">
<!-- Hero Section / Status Summary -->
<section class="mb-8">
<div class="bg-gradient-to-br from-secondary-container to-tertiary-container p-6 rounded-[2rem] shadow-lg relative overflow-hidden">
<div class="relative z-10">
<p class="text-on-tertiary-container font-headline font-bold text-sm uppercase tracking-wider mb-1">宝贝加油</p>
<h2 class="text-on-tertiary-container font-headline font-extrabold text-3xl">还有 2 个任务<br/>在等待审核哦！</h2>
</div>
<div class="absolute -right-4 -bottom-4 opacity-20">
<span class="material-symbols-outlined text-9xl" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
</section>
<!-- Audit List -->
<div class="space-y-6">
<!-- Item 1: Pending -->
<div class="bouncy-card bg-surface-container-lowest p-5 rounded-[1.5rem] flex items-center gap-4 transition-all active:scale-[0.98]">
<div class="w-16 h-16 rounded-2xl bg-orange-100 flex items-center justify-center text-orange-600">
<span class="material-symbols-outlined text-4xl" data-icon="brush" style="font-variation-settings: 'FILL' 1;">brush</span>
</div>
<div class="flex-1">
<h3 class="font-headline font-bold text-xl text-on-surface">乖乖刷牙</h3>
<p class="text-on-surface-variant text-sm font-medium">今天 10:30</p>
</div>
<div class="flex flex-col items-end gap-1">
<span class="inline-flex items-center gap-1 px-4 py-2 bg-secondary-container/20 text-secondary font-bold rounded-full text-sm">
<span class="material-symbols-outlined text-lg" data-icon="hourglass_empty">hourglass_empty</span>
                        待审核
                    </span>
</div>
</div>
<!-- Item 2: Approved -->
<div class="bouncy-card bg-surface-container-lowest p-5 rounded-[1.5rem] flex items-center gap-4 transition-all active:scale-[0.98]">
<div class="w-16 h-16 rounded-2xl bg-blue-100 flex items-center justify-center text-blue-600">
<span class="material-symbols-outlined text-4xl" data-icon="sports_esports" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
</div>
<div class="flex-1">
<h3 class="font-headline font-bold text-xl text-on-surface">游戏时间</h3>
<p class="text-on-surface-variant text-sm font-medium">昨天 19:15</p>
</div>
<div class="flex flex-col items-end gap-1">
<span class="inline-flex items-center gap-1 px-4 py-2 bg-emerald-100 text-emerald-600 font-bold rounded-full text-sm">
<span class="material-symbols-outlined text-lg" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        已通过
                    </span>
</div>
</div>
<!-- Item 3: Pending -->
<div class="bouncy-card bg-surface-container-lowest p-5 rounded-[1.5rem] flex items-center gap-4 transition-all active:scale-[0.98]">
<div class="w-16 h-16 rounded-2xl bg-purple-100 flex items-center justify-center text-purple-600">
<span class="material-symbols-outlined text-4xl" data-icon="menu_book" style="font-variation-settings: 'FILL' 1;">menu_book</span>
</div>
<div class="flex-1">
<h3 class="font-headline font-bold text-xl text-on-surface">阅读 30 分钟</h3>
<p class="text-on-surface-variant text-sm font-medium">今天 09:00</p>
</div>
<div class="flex flex-col items-end gap-1">
<span class="inline-flex items-center gap-1 px-4 py-2 bg-secondary-container/20 text-secondary font-bold rounded-full text-sm">
<span class="material-symbols-outlined text-lg" data-icon="hourglass_empty">hourglass_empty</span>
                        待审核
                    </span>
</div>
</div>
<!-- Item 4: Rejected -->
<div class="bouncy-card bg-surface-container-lowest p-5 rounded-[1.5rem] flex items-center gap-4 transition-all active:scale-[0.98]">
<div class="w-16 h-16 rounded-2xl bg-rose-100 flex items-center justify-center text-rose-600">
<span class="material-symbols-outlined text-4xl" data-icon="cleaning_services" style="font-variation-settings: 'FILL' 1;">cleaning_services</span>
</div>
<div class="flex-1">
<h3 class="font-headline font-bold text-xl text-on-surface">整理玩具</h3>
<p class="text-on-surface-variant text-sm font-medium">10月24日 16:20</p>
</div>
<div class="flex flex-col items-end gap-1">
<span class="inline-flex items-center gap-1 px-4 py-2 bg-rose-100 text-rose-600 font-bold rounded-full text-sm">
<span class="material-symbols-outlined text-lg" data-icon="cancel" style="font-variation-settings: 'FILL' 1;">cancel</span>
                        已驳回
                    </span>
</div>
</div>
<!-- Decorative Empty State Hint -->
<div class="text-center py-8">
<div class="inline-block p-4 bg-surface-container rounded-full mb-4">
<span class="material-symbols-outlined text-4xl text-outline" data-icon="auto_awesome">auto_awesome</span>
</div>
<p class="text-on-surface-variant font-medium">完成更多任务来获取奖励吧！</p>
</div>
</div>
</main>
<!-- BottomNavBar -->
</body></html>
