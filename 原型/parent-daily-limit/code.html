<body class="bg-background font-body text-on-surface min-h-screen flex flex-col relative">
<div class="fixed inset-0 noise-texture z-0"></div>
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 bg-slate-50 flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-slate-200/50 transition-colors active:scale-95 duration-200 text-sky-700">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-semibold tracking-tight text-sky-800 text-lg">每日积分上限</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high border-2 border-primary-container">
<img alt="Parent Profile" class="w-full h-full object-cover" data-alt="professional headshot of a friendly parent with warm lighting and soft background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAfsb2Vw9mFMbvlo7oBD77SGvNVYzCZ0O61B1irlyAe5WhGQqpeQKcNr0p1qdrxK1ZC0UIYLFG9xaC8UyVUj_3QnNfatoZgBUd9hKFd7sQKiWL8bqhHPNUiLZMBgI9wvtyV1etdCPJhsYzIxrHnliYVAs4rmQ0LR7NSHepYcA-H3iDoQJt9hSo7gqdtDCPiGj4yJ8jK0MJsXikF15h-KnIZXoHlVs1-ohuMakCIHMRepyqUdeC9TXuCHqC6RXssdhvxRDR1MESnfWXy"/>
</div>
</header>
<main class="flex-grow flex flex-col px-6 pt-10 pb-24 relative z-10 max-w-2xl mx-auto w-full">
<!-- Editorial Header Section -->
<section class="mb-12">
<span class="font-label text-xs uppercase tracking-wider text-outline mb-2 block">Executive Suite / Limits</span>
<h2 class="font-headline text-3xl font-extrabold text-on-surface-variant leading-tight">管理成长动力</h2>
<p class="mt-4 text-on-surface-variant leading-relaxed opacity-80">
                平衡奖励与挑战是培养习惯的关键。通过设置上限，您可以确保任务系统的可持续性。
            </p>
</section>
<!-- Main Input Card (Glassmorphism & Tonal Layering) -->
<div class="bg-surface-container-lowest rounded-3xl p-8 shadow-[0_12px_24px_-4px_rgba(0,102,136,0.06)] relative overflow-hidden group">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/10 rounded-full -mr-16 -mt-16 transition-transform group-hover:scale-110 duration-500"></div>
<div class="flex flex-col items-center justify-center space-y-8 relative z-10">
<!-- Display Area -->
<div class="text-center">
<div class="inline-flex items-baseline gap-1">
<span class="font-headline text-6xl font-extrabold text-primary tracking-tighter">500</span>
<span class="font-headline text-xl font-bold text-primary-container uppercase">pts</span>
</div>
<p class="text-outline text-sm mt-2 font-medium">当前每日上限额度</p>
</div>
<!-- Slider Control -->
<div class="w-full space-y-4">
<div class="relative w-full h-2 bg-surface-container rounded-full overflow-hidden">
<div class="absolute left-0 top-0 h-full bg-primary w-1/2"></div>
</div>
<input class="w-full h-2 bg-transparent appearance-none cursor-pointer absolute -mt-6 accent-primary" max="1000" min="100" step="50" type="range" value="500"/>
<div class="flex justify-between text-[10px] font-bold text-outline uppercase tracking-widest px-1">
<span>100 pts</span>
<span>1000 pts</span>
</div>
</div>
<!-- Subtle Number Input Fallback -->
<div class="w-full pt-4 border-t border-outline-variant/15">
<label class="block text-xs font-bold text-outline uppercase tracking-widest mb-3">手动调整</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 px-6 text-xl font-bold focus:ring-2 focus:ring-primary-container transition-all text-on-surface" placeholder="输入数值" type="number" value="500"/>
<span class="absolute right-6 font-bold text-primary-container">PTS</span>
</div>
</div>
</div>
</div>
<!-- Tip Section -->
<div class="mt-8 flex gap-4 p-5 rounded-2xl bg-surface-container-low items-start">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary text-xl" data-icon="info">info</span>
</div>
<div class="space-y-1">
<h4 class="text-sm font-bold text-on-surface">安全防刷提醒</h4>
<p class="text-sm text-on-surface-variant leading-relaxed">
                    设置孩子每日通过任务可获得的最大积分限额，防止刷分。合理的上限能鼓励孩子更专注于任务质量，而非数量。
                </p>
</div>
</div>
<!-- Bento Style Stats Grid (Decorative/Contextual) -->
<div class="grid grid-cols-2 gap-4 mt-8">
<div class="p-5 rounded-2xl bg-surface-container-high/50 flex flex-col justify-between h-32">
<span class="material-symbols-outlined text-secondary" data-icon="trending_up">trending_up</span>
<div>
<div class="text-xs font-bold text-outline uppercase tracking-wider">上周平均</div>
<div class="text-xl font-bold text-on-surface">320 pts</div>
</div>
</div>
<div class="p-5 rounded-2xl bg-surface-container-high/50 flex flex-col justify-between h-32">
<span class="material-symbols-outlined text-tertiary" data-icon="stars">stars</span>
<div>
<div class="text-xs font-bold text-outline uppercase tracking-wider">建议范围</div>
<div class="text-xl font-bold text-on-surface">400-600</div>
</div>
</div>
</div>
</main>
<!-- Fixed Action Button / Save Footer -->
<footer class="fixed bottom-0 left-0 w-full px-6 pb-10 pt-4 bg-gradient-to-t from-background via-background/95 to-transparent z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-bold text-lg shadow-[0_12px_24px_-4px_rgba(0,102,136,0.3)] hover:shadow-[0_16px_32px_-4px_rgba(0,102,136,0.4)] hover:-translate-y-0.5 transition-all active:scale-[0.98] duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="save">save</span>
                保存设置
            </button>
</div>
</footer>
<!-- Background Decoration -->
<div class="fixed top-1/4 -right-24 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-1/4 -left-24 w-80 h-80 bg-secondary-container/5 rounded-full blur-3xl -z-10"></div>
</body></html>
