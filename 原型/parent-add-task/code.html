<!DOCTYPE html>

            font-family: 'Inter', sans-serif;

            background-image: radial-gradient(#00668805 1px, transparent 0);
            background-size: 24px 24px;

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }
    </style>

                        "inverse-on-surface": "#eff1f3",
                        "primary-container": "#4fc3f7",
                        "tertiary-fixed": "#ffddb0",
                        "primary": "#006688",
                        "surface": "#f8f9fb",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#f8f9fb",
                        "on-tertiary-fixed": "#281800",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#dfaf66",
                        "on-surface-variant": "#3e484f",
                        "secondary": "#8b5000",
                        "secondary-fixed-dim": "#ffb870",
                        "secondary-container": "#ff9800",
                        "error-container": "#ffdad6",
                        "background": "#f8f9fb",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#653900",
                        "tertiary": "#7c5716",
                        "inverse-surface": "#2d3133",
                        "inverse-primary": "#75d1ff",

<body class="text-on-surface">
<div class="noise-texture"></div>
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-slate-50 dark:bg-slate-900">
<div class="flex items-center gap-4">
<button class="p-2 text-sky-700 dark:text-sky-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors rounded-full active:scale-95 duration-150" style="">
<span class="material-symbols-outlined" data-icon="arrow_back" style="">arrow_back</span>
</button>
<h1 class="text-xl font-bold text-sky-900 dark:text-sky-100 font-['Plus_Jakarta_Sans'] tracking-tight" style="">任务详情</h1>
</div>
<div class="flex items-center">
<div class="w-10 h-10 rounded-full overflow-hidden bg-primary-container/20 flex items-center justify-center">
<img alt="Parent Profile" class="w-full h-full object-cover" data-alt="professional headshot of a smiling middle-aged parent in a bright modern office setting, soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBIScwGmEqJhEZPVRU3oI8_s37-CSWc32RHdzUwJIE8oZh2xUOUi8rPNq-JEx4dmrHLaRhec1LYiDcuoySOEpzj0bTtwNp1y3psQi9g-Vy3JXyx665y-C_W9rPFkvkjuX2KihmnOxHAh4-Qpd8kqURLhOIm5NggiQfTSWlraLdwC6K-6Apu9JQUFhv_bDH_tQZ_eYWCNcZuCTKDWz4rsp8apNob5E718rYSaedGH85suAjQmfT69XLRz6fAgryVBZjOyeL4fQjMJEj9" style=""/>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto min-h-screen">
<!-- Hero Context -->
<div class="mb-10 animate-fade-in">
<span class="font-label text-[0.75rem] uppercase tracking-widest text-primary font-bold" style="">新增任务</span>
<h2 class="font-headline text-3xl font-extrabold text-on-surface mt-2 tracking-tight" style="">制定新的成长目标</h2>
<p class="text-on-surface-variant mt-2 text-sm leading-relaxed max-w-md" style="">通过明确的任务引导，帮助孩子在日常生活中建立责任感与良好的行为习惯。</p>
</div>
<section class="space-y-8">
<!-- Task Name Field -->
<div class="group">
<label class="block font-label text-[0.7rem] font-bold uppercase tracking-wider text-outline mb-3 ml-1" style="">任务名称</label>
<input class="w-full bg-surface-container-highest border-none focus:ring-0 border-b-2 border-transparent focus:border-primary transition-all px-4 py-4 rounded-xl text-lg font-medium placeholder:text-outline/50" placeholder="例如：每天阅读30分钟" type="text"/>
</div>
<!-- Category Selection - Horizontal Scroll / Bento Style -->
<div>
<label class="block font-label text-[0.7rem] font-bold uppercase tracking-wider text-outline mb-4 ml-1" style="">任务分类</label>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-surface-container-low hover:bg-primary-container/20 transition-all border border-transparent hover:border-primary/30 group active:scale-95" style="">
<span class="material-symbols-outlined text-primary mb-2 text-3xl" data-icon="auto_awesome" style="">auto_awesome</span>
<span class="text-sm font-semibold text-on-surface-variant group-hover:text-primary" style="">好习惯</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-surface-container-lowest shadow-sm border border-primary/20 transition-all group active:scale-95 ring-2 ring-primary/10" style="">
<span class="material-symbols-outlined text-primary mb-2 text-3xl" data-icon="menu_book" style="">menu_book</span>
<span class="text-sm font-semibold text-primary" style="">学习</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-surface-container-low hover:bg-primary-container/20 transition-all border border-transparent hover:border-primary/30 group active:scale-95" style="">
<span class="material-symbols-outlined text-primary mb-2 text-3xl" data-icon="cleaning_services" style="">cleaning_services</span>
<span class="text-sm font-semibold text-on-surface-variant group-hover:text-primary" style="">家务</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-surface-container-low hover:bg-primary-container/20 transition-all border border-transparent hover:border-primary/30 group active:scale-95" style="">
<span class="material-symbols-outlined text-primary mb-2 text-3xl" data-icon="verified" style="">verified</span>
<span class="text-sm font-semibold text-on-surface-variant group-hover:text-primary" style="">品德</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-surface-container-low hover:bg-primary-container/20 transition-all border border-transparent hover:border-primary/30 group active:scale-95" style="">
<span class="material-symbols-outlined text-primary mb-2 text-3xl" data-icon="add_circle" style="">add_circle</span>
<span class="text-sm font-semibold text-on-surface-variant group-hover:text-primary" style="">自定义</span>
</button></div>
</div>
<!-- Reward Points -->
<div class="bg-surface-container-low rounded-3xl p-6 relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16"></div>
<label class="block font-label text-[0.7rem] font-bold uppercase tracking-wider text-outline mb-4 ml-1" style="">奖励积分奖励</label>
<div class="flex items-center gap-3">
<button class="flex-1 py-3 px-2 rounded-xl bg-surface-container-lowest text-primary font-bold hover:shadow-md transition-shadow active:scale-95 border border-outline-variant/20" style="">+5</button>
<button class="flex-1 py-3 px-2 rounded-xl bg-primary text-on-primary font-bold shadow-lg shadow-primary/20 active:scale-95" style="">+10</button>
<button class="flex-1 py-3 px-2 rounded-xl bg-surface-container-lowest text-primary font-bold hover:shadow-md transition-shadow active:scale-95 border border-outline-variant/20" style="">+20</button>
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-container-highest">
<span class="material-symbols-outlined text-outline" data-icon="edit" style="">edit</span>
</div>
</div>
</div>
<!-- Frequency Selection -->
<div>
<label class="block font-label text-[0.7rem] font-bold uppercase tracking-wider text-outline mb-4 ml-1" style="">完成频率</label>
<div class="flex flex-wrap gap-2">
<button class="px-6 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant text-sm font-medium hover:bg-surface-container-high transition-colors" style="">每日</button>
<button class="px-6 py-2.5 rounded-full bg-primary text-on-primary text-sm font-bold shadow-md shadow-primary/10" style="">每周</button>
<button class="px-6 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant text-sm font-medium hover:bg-surface-container-high transition-colors" style="">单次</button>
<button class="px-6 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant text-sm font-medium hover:bg-surface-container-high transition-colors flex items-center gap-2" style="">
<span class="material-symbols-outlined text-[18px]" data-icon="calendar_today" style="">calendar_today</span>
                        自定义
                    </button>
</div>
</div>
</section>
<!-- Signature Card Component -->
<div class="mt-12 p-6 rounded-3xl bg-gradient-to-br from-primary to-primary-container text-on-primary flex items-center gap-6 shadow-xl shadow-primary/20">
<div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-3xl" data-icon="tips_and_updates" style='font-variation-settings: "FILL" 1;'>tips_and_updates</span>
</div>
<div>
<h4 class="font-bold text-lg leading-tight" style="">专家建议</h4>
<p class="text-sm opacity-90 mt-1" style="">设置具体且可量化的任务目标（如“阅读30分钟”而非“看书”），能提高孩子25%的完成效率。</p>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-slate-50/80 backdrop-blur-xl px-6 py-4 flex items-center gap-4">
<button class="flex-1 h-14 rounded-2xl bg-surface-container-high text-on-surface-variant font-bold hover:bg-surface-container-highest transition-colors active:scale-95 duration-150" style="">取消</button>
<button class="flex-[2] h-14 rounded-2xl bg-primary text-on-primary font-bold shadow-lg shadow-primary/30 hover:bg-surface-tint transition-all active:scale-95 duration-150 flex items-center justify-center gap-2" style="">
<span class="material-symbols-outlined" data-icon="save" style="">save</span>
            保存任务
        </button>
</footer>
</body></html>
