<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

              "secondary-container": "#ff9800",
              "on-primary-fixed-variant": "#004d67",

              "secondary-fixed-dim": "#ffb870",
              "tertiary-fixed": "#ffddb0",
              "on-primary-container": "#004e69",
              "on-primary": "#ffffff",
              "error": "#ba1a1a",
              "on-secondary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fb; }
        .plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bouncy-card { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bouncy-card:active { transform: scale(0.96) rotate(-1deg); }
        .noise-overlay {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            opacity: 0.03;
            z-index: 50;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen">
<div class="noise-overlay"></div>
<!-- Header / TopAppBar (JSON Mapping) -->
<header class="bg-orange-50/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 shadow-sm flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<button class="text-orange-600 dark:text-orange-400 hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl font-bold">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-xl tracking-tight text-orange-700">积分明细</h1>
</div>
<div class="w-10 h-10 rounded-full bg-secondary-container overflow-hidden border-2 border-white shadow-sm">
<img alt="Child Profile" data-alt="cute animated adventurer character profile picture with bright colors and friendly expression" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAprIGCd5WI6v52t-OVwoNhfHZql1aGj-B76YBp7z9g37FknCfKcfZ2GFLClWN5COu200pNeIHQQCWAQ9FXE5ker3qMY6AsYzr4uVNsYuJkD1W3BlNNgzhZBqiCVPggi_ei9ifQgiGUyM8RR7i-HON-H0228q4GMhpa7UL-C1_nOi7y0lk-O_ucLYTnB2ffvK2mrQLpoki-wjovebAdXWzdR52o04VjCFZw136mphsgxLXbqnzm8lFo3byhsUBdGSqgEF3u_k7o7TgQ"/>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 py-8 pb-24">
<!-- Current Balance: Display-LG editorial point display -->
<section class="mb-12 relative">
<div class="bg-gradient-to-br from-secondary-container to-orange-400 p-8 rounded-[2.5rem] shadow-xl text-white overflow-hidden relative">
<!-- Decorative Elements -->
<div class="absolute -top-10 -right-10 w-40 h-40 bg-white/20 rounded-full blur-2xl"></div>
<div class="absolute -bottom-10 -left-10 w-32 h-32 bg-yellow-300/30 rounded-full blur-xl"></div>
<div class="relative z-10 flex flex-col items-center">
<span class="text-sm font-bold tracking-[0.2em] uppercase opacity-90 mb-2 font-label">当前可用积分</span>
<div class="flex items-baseline gap-2">
<span class="text-6xl font-black plus-jakarta tracking-tighter">1,500</span>
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
<div class="mt-4 px-4 py-1.5 bg-white/20 backdrop-blur-md rounded-full text-xs font-semibold flex items-center gap-2">
<span class="material-symbols-outlined text-sm">trending_up</span>
<span>本周已获得 +240</span>
</div>
</div>
</div>
</section>
<!-- Timeline Section: No-Line Rule applied -->
<section class="space-y-6">
<div class="flex items-center justify-between mb-2">
<h2 class="text-lg font-bold plus-jakarta text-on-surface-variant">积分历史记录</h2>
<span class="text-xs font-bold text-orange-600 bg-orange-100 px-3 py-1 rounded-full uppercase tracking-wider">最近30天</span>
</div>
<!-- Transaction Items -->
<div class="space-y-4 relative">
<!-- Vertical Line Effect (Tonal Layering instead of borders) -->
<div class="absolute left-8 top-4 bottom-4 w-1 bg-surface-container-high rounded-full opacity-50"></div>
<!-- Item 1: Positive -->
<div class="bouncy-card relative flex items-center gap-5 p-5 bg-surface-container-lowest rounded-[1.5rem] shadow-sm hover:shadow-md transition-all">
<div class="relative z-10 flex-shrink-0 w-16 h-16 rounded-2xl bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">cleaning_services</span>
</div>
<div class="flex-grow">
<h3 class="font-bold plus-jakarta text-on-surface">睡前刷牙</h3>
<p class="text-sm text-on-surface-variant font-medium">今天 20:30</p>
</div>
<div class="text-right">
<span class="text-xl font-black plus-jakarta text-primary">+10</span>
</div>
</div>
<!-- Item 2: Redemption (Negative) -->
<div class="bouncy-card relative flex items-center gap-5 p-5 bg-surface-container-lowest rounded-[1.5rem] shadow-sm hover:shadow-md transition-all">
<div class="relative z-10 flex-shrink-0 w-16 h-16 rounded-2xl bg-secondary-container/20 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">icecream</span>
</div>
<div class="flex-grow">
<h3 class="font-bold plus-jakarta text-on-surface">兑换甜点奖励</h3>
<p class="text-sm text-on-surface-variant font-medium">今天 16:15</p>
</div>
<div class="text-right">
<span class="text-xl font-black plus-jakarta text-secondary">-50</span>
</div>
</div>
<!-- Item 3: Positive -->
<div class="bouncy-card relative flex items-center gap-5 p-5 bg-surface-container-lowest rounded-[1.5rem] shadow-sm hover:shadow-md transition-all">
<div class="relative z-10 flex-shrink-0 w-16 h-16 rounded-2xl bg-tertiary-container/20 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">menu_book</span>
</div>
<div class="flex-grow">
<h3 class="font-bold plus-jakarta text-on-surface">阅读课外书 30分钟</h3>
<p class="text-sm text-on-surface-variant font-medium">昨天 19:45</p>
</div>
<div class="text-right">
<span class="text-xl font-black plus-jakarta text-primary">+20</span>
</div>
</div>
<!-- Item 4: Positive -->
<div class="bouncy-card relative flex items-center gap-5 p-5 bg-surface-container-lowest rounded-[1.5rem] shadow-sm hover:shadow-md transition-all">
<div class="relative z-10 flex-shrink-0 w-16 h-16 rounded-2xl bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">self_improvement</span>
</div>
<div class="flex-grow">
<h3 class="font-bold plus-jakarta text-on-surface">整理书架</h3>
<p class="text-sm text-on-surface-variant font-medium">昨天 10:00</p>
</div>
<div class="text-right">
<span class="text-xl font-black plus-jakarta text-primary">+15</span>
</div>
</div>
<!-- Item 5: Large Bonus -->
<div class="bouncy-card relative flex items-center gap-5 p-5 bg-orange-50 rounded-[1.5rem] shadow-sm ring-2 ring-orange-200/50">
<div class="relative z-10 flex-shrink-0 w-16 h-16 rounded-2xl bg-orange-500/10 flex items-center justify-center text-orange-600">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
</div>
<div class="flex-grow">
<h3 class="font-bold plus-jakarta text-orange-800">完成周挑战奖励</h3>
<p class="text-sm text-orange-700/60 font-medium">10月22日</p>
</div>
<div class="text-right">
<span class="text-xl font-black plus-jakarta text-primary">+100</span>
</div>
</div>
</div>
<!-- More indicator -->
<button class="w-full py-4 text-on-surface-variant font-semibold text-sm flex items-center justify-center gap-2 hover:text-orange-600 transition-colors">
                加载更多记录
                <span class="material-symbols-outlined">expand_more</span>
</button>
</section>
</main>
<!-- Bottom Action Area (Suppressed global nav for task focus, but kept a contextual FAB for parent/child engagement) -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-xs px-6">
<button class="w-full h-16 bg-secondary-container text-on-secondary-container rounded-full shadow-2xl flex items-center justify-center gap-3 plus-jakarta font-bold text-lg hover:scale-105 active:scale-95 transition-all shadow-orange-500/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">redeem</span>
            去换奖品
        </button>
</div>
<!-- Decorative Bottom Gradient -->
<div class="fixed bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-surface to-transparent pointer-events-none"></div>
</body></html>
