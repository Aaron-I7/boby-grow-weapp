<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>添加新愿望</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#eceef0",
              "primary-fixed": "#c2e8ff",
              "surface": "#f8f9fb",
              "tertiary": "#7c5716",
              "surface-container-high": "#e6e8ea",
              "on-surface": "#191c1e",
              "primary": "#006688",
              "on-primary": "#ffffff",
              "surface-dim": "#d8dadc",
              "on-tertiary": "#ffffff",
              "secondary-container": "#ff9800",
              "background": "#f8f9fb",
              "primary-fixed-dim": "#75d1ff",
              "on-secondary-container": "#653900",
              "surface-container-low": "#f2f4f6",
              "on-secondary-fixed": "#2c1600",
              "primary-container": "#4fc3f7",
              "secondary-fixed-dim": "#ffb870",
              "on-primary-fixed-variant": "#004d67",
              "on-tertiary-fixed-variant": "#614000",
              "outline-variant": "#bdc8d0",
              "on-secondary-fixed-variant": "#693c00",
              "on-primary-container": "#004e69",
              "on-background": "#191c1e",
              "outline": "#6e7980",
              "on-secondary": "#ffffff",
              "error": "#ba1a1a",
              "on-surface-variant": "#3e484f",
              "secondary-fixed": "#ffdcbe",
              "on-tertiary-container": "#634100",
              "error-container": "#ffdad6",
              "surface-tint": "#006688",
              "on-error": "#ffffff",
              "on-tertiary-fixed": "#281800",
              "inverse-on-surface": "#eff1f3",
              "inverse-primary": "#75d1ff",
              "surface-container-highest": "#e0e3e5",
              "surface-bright": "#f8f9fb",
              "on-error-container": "#93000a",
              "on-primary-fixed": "#001e2b",
              "inverse-surface": "#2d3133",
              "surface-variant": "#e0e3e5",
              "tertiary-container": "#dfaf66",
              "secondary": "#8b5000",
              "tertiary-fixed-dim": "#f0be74",
              "tertiary-fixed": "#ffddb0",
              "surface-container-lowest": "#ffffff"

            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .child-mode-shadow {
        box-shadow: 0 12px 24px -4px rgba(124, 87, 22, 0.08);
      }
      .inner-glow {
        box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3);
      }
      body {
        background-image: radial-gradient(#dfaf66 0.5px, transparent 0.5px);
        background-size: 24px 24px;
        background-color: #f8f9fb;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body text-on-surface selection:bg-secondary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#F8F9FB] dark:bg-gray-900">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#006688] dark:text-[#4FC3F7] text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-xl text-[#006688] dark:text-[#4FC3F7]">添加新愿望</h1>
<button class="font-['Plus_Jakarta_Sans'] font-bold text-xl text-[#006688] dark:text-[#4FC3F7] hover:opacity-80 transition-opacity active:scale-95 duration-200">
            完成
        </button>
</header>
<main class="pt-24 px-6 max-w-md mx-auto min-h-screen pb-12">
<!-- Hero Illustration Area (Child Mode Asymmetry) -->
<div class="relative mb-10 transform -rotate-1">
<div class="absolute inset-0 bg-tertiary-container/20 rounded-[32px] blur-xl translate-y-4"></div>
<div class="relative bg-surface-container-lowest rounded-[32px] p-6 child-mode-shadow border-2 border-white">
<div class="flex items-center gap-4">
<div class="w-16 h-16 bg-secondary-container rounded-full flex items-center justify-center inner-glow">
<span class="material-symbols-outlined text-white text-3xl" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div>
<h2 class="font-headline font-bold text-2xl text-on-surface">大梦想家！</h2>
<p class="text-on-surface-variant text-lg">今天想要实现什么愿望？</p>
</div>
</div>
</div>
</div>
<!-- Input Section -->
<section class="space-y-8">
<div class="space-y-4">
<label class="block font-headline font-bold text-xl px-2 text-tertiary">愿望名称</label>
<div class="relative group">
<input class="w-full h-20 px-8 rounded-full bg-surface-container-lowest border-none text-xl font-medium focus:ring-4 focus:ring-tertiary-container/30 placeholder:text-outline-variant child-mode-shadow transition-all" placeholder="我想兑换的是..." type="text"/>
<div class="absolute right-6 top-1/2 -translate-y-1/2 text-secondary-container">
<span class="material-symbols-outlined text-3xl" data-icon="edit_note">edit_note</span>
</div>
</div>
</div>
<!-- Icon Selector -->
<div class="space-y-4">
<label class="block font-headline font-bold text-xl px-2 text-tertiary">选择一个图标</label>
<div class="grid grid-cols-4 gap-4">
<!-- Icon Item 1 -->
<button class="aspect-square rounded-[24px] bg-surface-container-lowest flex items-center justify-center child-mode-shadow border-4 border-secondary-container transform hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl text-secondary" data-icon="sports_soccer">sports_soccer</span>
</button>
<!-- Icon Item 2 -->
<button class="aspect-square rounded-[24px] bg-surface-container-lowest flex items-center justify-center child-mode-shadow border-4 border-transparent hover:border-secondary-container/30 transform hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl text-tertiary" data-icon="menu_book">menu_book</span>
</button>
<!-- Icon Item 3 -->
<button class="aspect-square rounded-[24px] bg-surface-container-lowest flex items-center justify-center child-mode-shadow border-4 border-transparent hover:border-secondary-container/30 transform hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl text-tertiary" data-icon="sports_esports">sports_esports</span>
</button>
<!-- Icon Item 4 -->
<button class="aspect-square rounded-[24px] bg-surface-container-lowest flex items-center justify-center child-mode-shadow border-4 border-transparent hover:border-secondary-container/30 transform hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl text-tertiary" data-icon="local_pizza">local_pizza</span>
</button>
<!-- Icon Item 5 -->
<button class="aspect-square rounded-[24px] bg-surface-container-lowest flex items-center justify-center child-mode-shadow border-4 border-transparent hover:border-secondary-container/30 transform hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl text-tertiary" data-icon="pedal_bike">pedal_bike</span>
</button>
<!-- Icon Item 6 -->
<button class="aspect-square rounded-[24px] bg-surface-container-lowest flex items-center justify-center child-mode-shadow border-4 border-transparent hover:border-secondary-container/30 transform hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl text-tertiary" data-icon="icecream">icecream</span>
</button>
<!-- Icon Item 7 -->
<button class="aspect-square rounded-[24px] bg-surface-container-lowest flex items-center justify-center child-mode-shadow border-4 border-transparent hover:border-secondary-container/30 transform hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl text-tertiary" data-icon="toys">toys</span>
</button>
<!-- Icon Item 8 -->
<button class="aspect-square rounded-[24px] bg-surface-container-lowest flex items-center justify-center child-mode-shadow border-4 border-transparent hover:border-secondary-container/30 transform hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl text-tertiary" data-icon="more_horiz">more_horiz</span>
</button>
</div>
</div>
<!-- Hint Text -->
<div class="flex items-center justify-center gap-2 pt-4">
<span class="material-symbols-outlined text-secondary-container text-lg" data-icon="info">info</span>
<p class="text-on-surface-variant font-medium text-sm">你的愿望会发送给爸爸妈妈审核哦~</p>
</div>
</section>
<!-- Submit Button Area -->
<div class="mt-12">
<button class="w-full h-16 bg-secondary-container text-white font-headline font-bold text-xl rounded-full child-mode-shadow inner-glow transform active:scale-95 transition-all hover:brightness-105 flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="send" style="font-variation-settings: 'FILL' 1;">send</span>
                提交愿望
            </button>
</div>
</main>
<!-- BottomNavBar -->
<!-- Background Decorative Elements -->
<div class="fixed top-40 -left-10 w-32 h-32 bg-primary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-40 -right-10 w-48 h-48 bg-secondary-container/10 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
