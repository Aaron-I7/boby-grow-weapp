<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MCP 查询核验码</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#ffb870",
              "inverse-primary": "#75d1ff",

<style>
        .noise-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen relative overflow-x-hidden">
<div class="fixed inset-0 noise-overlay z-50"></div>
<!-- Header -->
<header class="w-full top-0 sticky z-40 bg-slate-50 dark:bg-slate-900 flex items-center justify-between px-6 py-4 shadow-sm">
<div class="flex items-center gap-4">
<button class="p-2 rounded-lg hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-sky-700 dark:text-sky-400">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-semibold tracking-tight text-sky-700 dark:text-sky-400 text-lg">
                MCP 查询核验码
            </h1>
</div>
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-bold border-2 border-surface-container-lowest shadow-sm">
            P
        </div>
</header>
<main class="max-w-md mx-auto px-6 py-8 flex flex-col items-center min-h-[calc(100vh-80px)]">
<!-- 1. 孩子选择器 -->
<div class="w-full mb-8">
<div class="flex items-center gap-3 overflow-x-auto pb-2 no-scrollbar">
<!-- Active Child -->
<button class="flex items-center gap-2 bg-primary/10 border-2 border-primary rounded-full pl-1 pr-4 py-1 flex-shrink-0 transition-all">
<img alt="avatar" class="w-8 h-8 rounded-full border border-white" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBjcV2_IRWf9dgD28pu_FVMe_Mqs1k-frXzEp1_PURv0i3L-NDq6hFAOxe_riKHn9ey-Obi2M6lbY6mYG-J6T5Uhw6_ypqmbDBfYBO0TjMxAum6y8fMhCtUDk6pKZCl_dsOOZBpc3Yex1uoZQKFnyFA3sPGyO3BcyrWdgrdMK5_AMMtWTug6iXkBXx3R5y-_HXIl8Om3SaomZYM9C3EkMpzOQ_a0Wh-l3Sx87QcCmEGIKisqMfrgd3AD-3V0tF4_Lfj1piQ3izzPD1b"/>
<span class="text-primary font-bold text-sm">小明</span>
</button>
<!-- Other Children -->
<button class="flex items-center gap-2 bg-surface-container-low border border-outline-variant/30 rounded-full pl-1 pr-4 py-1 flex-shrink-0 opacity-70 grayscale-[0.5]">
<img alt="avatar" class="w-8 h-8 rounded-full border border-white" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDafKW9p7sJMrN81Z_1HTxIpUBn10b-9oAQViKRVbRVyCKaZ-wTosYqdcUpNqJvA6OwyAcnGdAPW561sygmzS1Krr3FwH2stLkn6CtHjRCpP2AkmbDhbUkDFyysnKSiWv8TDPfPw1B2TLLWGnLTpqHvvY4-Zx-6mRdsQmOnnX8KLDHVn3LMHwGK4xIqMXMPXBYUYF45Gwe9Rwoa-EMFbyuFI8P4n-w7xy24w3lPwXiJZY8qUC5BwBE_otryipjigwBX3tXANmQGWxYt"/>
<span class="text-on-surface-variant font-medium text-sm">小红</span>
</button>
<!-- Add Button -->
<button class="w-10 h-10 flex items-center justify-center rounded-full border-2 border-dashed border-outline-variant/50 text-outline-variant">
<span class="material-symbols-outlined text-xl">add</span>
</button>
</div>
</div>
<!-- 2. 隐私提示 -->
<div class="w-full mb-8 px-4 py-3 bg-primary/5 rounded-xl border border-primary/10 flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-xl">verified_user</span>
<p class="text-primary/80 text-xs font-medium leading-tight">
                每个孩子拥有独立的 6 位核验码，确保数据隐私安全。
            </p>
</div>
<!-- Hero Decorative Anchor -->
<div class="relative w-full mb-8 flex justify-center">
<div class="absolute -top-6 -left-4 w-24 h-24 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-8 -right-4 w-32 h-32 bg-secondary/5 rounded-full blur-3xl"></div>
<div class="relative z-10 p-8 w-full aspect-square max-w-[280px] bg-surface-container-lowest rounded-[2.5rem] shadow-[0_12px_32px_-4px_rgba(0,102,136,0.12)] flex flex-col items-center justify-center text-center overflow-hidden border border-white/50">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-primary-container to-primary"></div>
<div class="space-y-2">
<p class="font-label text-xs uppercase tracking-[0.15em] text-outline mb-4">
<span class="font-bold text-primary">小明</span> 的核验码
                    </p>
<div class="flex gap-3 justify-center items-center">
<span class="font-headline font-extrabold text-5xl tracking-tight text-primary">888</span>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant opacity-40"></div>
<span class="font-headline font-extrabold text-5xl tracking-tight text-primary">666</span>
</div>
</div>
</div>
</div>
<!-- Action Section -->
<div class="w-full space-y-4">
<div class="grid grid-cols-1 gap-4">
<!-- 复制按钮 -->
<button class="w-full h-[56px] bg-primary text-on-primary rounded-xl font-semibold shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 px-8 group">
<span class="material-symbols-outlined text-xl group-hover:rotate-12 transition-transform">content_copy</span>
<span>点击复制</span>
</button>
<!-- 重置按钮 -->
<button class="w-full h-[56px] bg-surface-container-high text-on-surface-variant rounded-xl font-medium border border-outline-variant/30 hover:bg-surface-container-highest active:scale-[0.98] transition-all flex items-center justify-center gap-2 px-8">
<span class="material-symbols-outlined text-xl">refresh</span>
<span>重置核验码</span>
</button>
</div>
<!-- 说明卡片 -->
<div class="bg-surface-container-low rounded-2xl p-6 relative overflow-hidden group border border-outline-variant/10">
<div class="absolute top-0 right-0 p-4 opacity-5">
<span class="material-symbols-outlined text-6xl">info</span>
</div>
<div class="flex gap-4 items-start relative z-10">
<div class="mt-1 flex-shrink-0 w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-lg">lightbulb</span>
</div>
<p class="text-on-surface-variant leading-relaxed text-[14px] font-medium">
                        请将此核验码提供给孩子，以便在 <span class="text-primary font-bold">豆包</span> 等 AI 工具中查询积分。
                    </p>
</div>
</div>
<!-- Footer Meta / Security -->
<div class="pt-8 space-y-6">
<div class="flex items-center gap-3 px-2">
<div class="h-[1px] flex-grow bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
<span class="flex items-center gap-2 text-outline text-[10px] font-label uppercase tracking-widest whitespace-nowrap">
<span class="material-symbols-outlined text-xs" style="font-variation-settings: 'FILL' 1;">security</span>
                        安全提示
                    </span>
<div class="h-[1px] flex-grow bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
</div>
<p class="text-center text-on-surface-variant/60 text-xs leading-relaxed max-w-[280px] mx-auto italic">
                    “核验码仅供查询，无法操作积分。”
                </p>
</div>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary-container/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<div class="fixed top-1/4 -right-12 w-48 h-48 bg-secondary-container/5 rounded-full blur-[80px] pointer-events-none -z-10"></div>
</body></html>
