<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#4fc3f7",
                        "on-secondary-fixed": "#2c1600",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#bdc8d0",
                        "on-surface-variant": "#3e484f",
                        "inverse-primary": "#75d1ff",
                        "surface-variant": "#e0e3e5",
                        "inverse-surface": "#2d3133",
                        "on-primary-container": "#004e69",
                        "tertiary": "#7c5716",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#693c00",
                        "on-secondary": "#ffffff",
                        "background": "#f8f9fb",
                        "surface-bright": "#f8f9fb",
                        "on-primary-fixed-variant": "#004d67",
                        "secondary-container": "#ff9800",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#c2e8ff",
                        "on-tertiary-container": "#634100",
                        "inverse-on-surface": "#eff1f3",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f2f4f6",
                        "on-primary-fixed": "#001e2b",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#f0be74",
                        "on-tertiary-fixed": "#281800",
                        "outline": "#6e7980",
                        "on-secondary-container": "#653900",
                        "secondary-fixed-dim": "#ffb870",
                        "secondary-fixed": "#ffdcbe",
                        "on-error": "#ffffff",
                        "surface-container": "#eceef0",
                        "on-surface": "#191c1e",
                        "surface": "#f8f9fb",
                        "tertiary-fixed": "#ffddb0",
                        "on-tertiary-fixed-variant": "#614000",
                        "surface-dim": "#d8dadc",
                        "primary-fixed-dim": "#75d1ff",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e6e8ea",
                        "tertiary-container": "#dfaf66",
                        "primary": "#006688",
                        "surface-tint": "#006688",
                        "secondary": "#8b5000",
                        "on-background": "#191c1e"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .noise-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<div class="noise-texture"></div>
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-slate-50 dark:bg-slate-900">
<div class="flex items-center justify-between px-6 py-4 w-full">
<button class="text-sky-700 dark:text-sky-400 active:scale-95 duration-200 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-full p-2">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-semibold text-lg tracking-tight text-on-surface">Join Family</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<div class="bg-slate-100 dark:bg-slate-800 h-[1px] w-full"></div>
</header>
<main class="flex-grow px-6 py-8 max-w-lg mx-auto w-full">
<!-- Hero Section: Invitation Context -->
<section class="mb-10 text-center">
<div class="inline-block p-1 rounded-full bg-gradient-to-tr from-primary to-primary-container mb-6 shadow-lg">
<div class="relative w-24 h-24 rounded-full overflow-hidden border-4 border-white">
<img class="w-full h-full object-cover" data-alt="Close-up portrait of a smiling woman with warm lighting and a soft-focus garden background, radiating a welcoming and friendly motherly vibe" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmiIWLcTfPnUgLn30-Q2dN-2tGLk-80TejodvMb7zM2XRoyTMtenL91hi0rlbLVUUwV6i3JlYL4TFAM_kjoRnJfs_5jIaXXOXMMOlnQmFqA94iAIQRcA27uyTuwySQ8mpdAEyUZg-yE9Z9fhw0hrn9HMFrazfM8WjtXGQ5sjmOyQjRkk5kzgpxscvT892HXeYZWvBwRzU3S4TIhSKonKldVc08XUvFQlyY5C2XyBVJ8vRcLj-YYWgsZrvzj4_gouldnBvbiYq3343S"/>
</div>
</div>
<h2 class="font-headline font-bold text-2xl tracking-tight text-on-surface mb-2">王小明的快乐成长营</h2>
<p class="text-on-surface-variant text-sm font-medium tracking-wide uppercase font-label">诚邀您加入家庭管理小组</p>
</section>
<!-- Form Section -->
<div class="space-y-8">
<!-- Information Card -->
<section class="bg-surface-container-lowest rounded-3xl p-6 shadow-[0_12px_24px_-4px_rgba(0,102,136,0.06)] relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
<div class="relative z-10">
<label class="block font-headline font-bold text-on-surface mb-4 ml-1" for="nickname">设置您的称呼</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-2xl px-5 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all text-lg font-medium" id="nickname" name="nickname" placeholder="例如：爸爸、奶奶、姑姑" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined">edit_note</span>
</div>
</div>
<div class="mt-6 flex gap-3 p-4 bg-primary/5 rounded-2xl">
<span class="material-symbols-outlined text-primary shrink-0" style="font-variation-settings: 'opsz' 20;">info</span>
<p class="text-on-surface-variant text-sm leading-relaxed">
                            提示：该名称将用于家庭内部沟通、任务分配以及您的积分发放记录。
                        </p>
</div>
</div>
</section>
<!-- Quick Suggestions -->
<section>
<h3 class="font-label font-bold text-[11px] uppercase tracking-widest text-on-surface-variant mb-4 ml-1">常用称呼</h3>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full bg-white text-primary text-sm font-semibold shadow-sm hover:bg-primary hover:text-white transition-colors border border-primary/10">爸爸</button>
<button class="px-5 py-2.5 rounded-full bg-white text-primary text-sm font-semibold shadow-sm hover:bg-primary hover:text-white transition-colors border border-primary/10">妈妈</button>
<button class="px-5 py-2.5 rounded-full bg-white text-primary text-sm font-semibold shadow-sm hover:bg-primary hover:text-white transition-colors border border-primary/10">爷爷</button>
<button class="px-5 py-2.5 rounded-full bg-white text-primary text-sm font-semibold shadow-sm hover:bg-primary hover:text-white transition-colors border border-primary/10">奶奶</button>
<button class="px-5 py-2.5 rounded-full bg-white text-primary text-sm font-semibold shadow-sm hover:bg-primary hover:text-white transition-colors border border-primary/10">老师</button>
</div>
</section>
</div>
</main>
<!-- Fixed Action Button Area -->
<footer class="p-6 bg-surface/80 backdrop-blur-md sticky bottom-0">
<div class="max-w-lg mx-auto">
<button class="w-full h-14 bg-primary text-on-primary font-headline font-bold text-lg rounded-2xl shadow-[0_12px_24px_-4px_rgba(0,102,136,0.25)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
<span>确认加入家庭</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="text-center mt-4 text-[11px] text-outline font-medium tracking-tight">
                点击“确认加入”即表示您同意《家庭协作服务协议》
            </p>
</div>
</footer>
<!-- Decorative Elements -->
<div class="fixed top-20 -left-12 w-48 h-48 bg-primary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-40 -right-12 w-64 h-64 bg-secondary-container/10 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
