</div>

<main class="pt-20 pb-28 px-6 max-w-md mx-auto space-y-8">

<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-2xl active:scale-95 transition-all relative">

<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
</div>

<span class="absolute top-4 right-4 w-5 h-5 bg-error text-on-error text-[10px] flex items-center justify-center rounded-full font-bold">1</span>
</button>
<button class="col-span-2 flex items-center justify-between p-5 bg-surface-container-lowest rounded-2xl group active:scale-[0.98] transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-container text-on-surface shadow-sm">
<span class="material-symbols-outlined text-2xl" data-icon="settings">settings</span>
</div>
<div class="text-left">
<h3 class="font-headline font-bold text-on-surface">全局设置</h3>
<p class="text-xs text-on-surface-variant">管理积分规则、通知与账号</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>

<span class="material-symbols-outlined mb-1" data-icon="dashboard" data-weight="fill" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="text-[10px] font-medium font-['Plus_Jakarta_Sans'] uppercase tracking-wider">工作台</span>

<span class="text-[10px] font-medium font-['Plus_Jakarta_Sans'] uppercase tracking-wider">任务中心</span>

<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 active:scale-90 duration-300 ease-out hover:text-sky-500 transition-all" href="#">
