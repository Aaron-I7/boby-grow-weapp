<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#f2f4f6",
              "on-primary-container": "#004e69",
              "outline-variant": "#bdc8d0",
              "inverse-on-surface": "#eff1f3",
              "secondary-fixed-dim": "#ffb870",
              "on-surface": "#191c1e",
              "error": "#ba1a1a",
              "on-surface-variant": "#3e484f",
              "error-container": "#ffdad6",
              "secondary-fixed": "#ffdcbe",
              "surface-tint": "#006688",
              "on-secondary-fixed-variant": "#693c00",
              "on-tertiary-fixed-variant": "#614000",
              "primary-fixed-dim": "#75d1ff",
              "on-background": "#191c1e",
              "tertiary-container": "#dfaf66",
              "on-tertiary": "#ffffff",
              "primary": "#006688",
              "surface-container": "#eceef0",
              "tertiary-fixed-dim": "#f0be74",
              "surface-bright": "#f8f9fb",
              "inverse-surface": "#2d3133",
              "secondary-container": "#ff9800",
              "on-secondary-container": "#653900",
              "on-tertiary-fixed": "#281800",
              "on-primary": "#ffffff",
              "outline": "#6e7980",
              "on-secondary-fixed": "#2c1600",
              "secondary": "#8b5000",
              "on-tertiary-container": "#634100",
              "surface-dim": "#d8dadc",
              "tertiary-fixed": "#ffddb0",
              "on-secondary": "#ffffff",
              "background": "#f8f9fb",
              "on-primary-fixed-variant": "#004d67",
              "on-error-container": "#93000a",
              "primary-container": "#4fc3f7",
              "on-primary-fixed": "#001e2b",
              "on-error": "#ffffff",
              "inverse-primary": "#75d1ff",
              "surface": "#f8f9fb",
              "primary-fixed": "#c2e8ff",
              "surface-container-highest": "#e0e3e5",
              "tertiary": "#7c5716",
              "surface-container-lowest": "#ffffff",
              "surface-variant": "#e0e3e5",
              "surface-container-high": "#e6e8ea"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .child-mode-shadow {
            box-shadow: 0 12px 24px -4px rgba(255, 152, 0, 0.2);
        }
        .bouncy-card {
            transform: rotate(-1.5deg);
        }
        .bouncy-card-alt {
            transform: rotate(1.2deg);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        body {
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 152, 0, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(79, 195, 247, 0.05) 0%, transparent 50%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col pb-10">
<!-- Top Profile & Points Section -->
<header class="pt-8 px-6 pb-6 relative overflow-hidden">
<div class="flex items-center justify-between mb-8">
<div class="flex items-center gap-4">
<div class="w-20 h-20 rounded-full border-4 border-secondary-container p-1 bg-surface-container-lowest shadow-lg">
<img alt="Avatar" class="w-full h-full rounded-full object-cover" data-alt="a cute 3D cartoon boy character with a friendly smile, vibrant colors, Pixar style animation look" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4V9EuP9B40zHZ67tXU7Glx08fJRQQ_XWCLQznpjzI07ytznHiMi7_s2f3hg3_c3QKcgltn1DVflL5Nq1JRZwpgks6hrrgfjfVHHg4T8LFXO4RPn7UZICYK4wMEhrkz7qiujJKfcVU8J_kP541O0M3ZEzhNyyBlfAwBGXE3h6lI1uXhDOGrLfFrRQra4TmeTbFZIe0facG5Es6gz853b1L51Jlj6MXzhdkm3TG5Dl4o26c_oAwqythbWFTSn0Uh4wKeXuZKnaxRrbf"/>
</div>
<div>
<h2 class="font-headline font-extrabold text-2xl text-on-surface tracking-tight">你好，小宝！</h2>
<p class="text-secondary font-bold text-lg">今日探险开始啦</p>
</div>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-2xl bg-surface-container-high text-secondary">
<span class="material-symbols-outlined text-3xl">settings</span>
</button>
</div>
<!-- Hero Points Card -->
<div class="relative bg-gradient-to-br from-secondary-container to-[#FFB74D] rounded-[40px] p-8 flex flex-col items-center justify-center shadow-xl overflow-hidden">
<!-- Decorative Stars -->
<span class="material-symbols-outlined absolute top-4 left-6 text-white/40 text-4xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined absolute bottom-6 right-8 text-white/60 text-5xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined absolute top-12 right-12 text-white/30 text-2xl" style="font-variation-settings: 'FILL' 1;">star</span>
<p class="text-white/90 font-bold text-xl mb-1 tracking-widest">我的能量积分</p>
<div class="flex items-baseline gap-2">
<span class="text-white font-headline font-black text-8xl drop-shadow-md">1500</span>
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
</div>
</header>
<!-- Task List Section -->
<main class="flex-1 px-6 mt-4">
<div class="flex items-center justify-between mb-6">
<h3 class="font-headline font-extrabold text-3xl text-on-surface">今日小任务</h3>
<span class="bg-tertiary-container/20 text-on-tertiary-container px-4 py-1 rounded-full font-bold">剩下 1 个</span>
</div>
<div class="space-y-6">
<!-- Task 1: Completed -->
<div class="bouncy-card bg-surface-container-lowest p-6 rounded-[32px] flex items-center justify-between child-mode-shadow border-b-8 border-slate-100">
<div class="flex items-center gap-6">
<div class="w-16 h-16 rounded-2xl bg-green-100 flex items-center justify-center text-green-600">
<span class="material-symbols-outlined text-5xl">clean_hands</span>
</div>
<div>
<h4 class="font-headline font-black text-2xl text-on-surface">乖乖刷牙</h4>
<p class="text-green-600 font-bold text-lg">太棒了！已完成</p>
</div>
</div>
<div class="w-12 h-12 rounded-full bg-green-500 flex items-center justify-center text-white">
<span class="material-symbols-outlined text-3xl font-bold">check</span>
</div>
</div>
<!-- Task 2: Pending -->
<div class="bouncy-card-alt bg-surface-container-lowest p-6 rounded-[32px] flex items-center justify-between child-mode-shadow border-b-8 border-slate-100">
<div class="flex items-center gap-6">
<div class="w-16 h-16 rounded-2xl bg-sky-100 flex items-center justify-center text-sky-600">
<span class="material-symbols-outlined text-5xl">menu_book</span>
</div>
<div>
<h4 class="font-headline font-black text-2xl text-on-surface">阅读时间</h4>
<p class="text-on-surface-variant font-bold text-lg">看书20分钟</p>
</div>
</div>
<button class="px-6 py-3 bg-secondary-container rounded-full text-white font-black text-xl shadow-lg active:scale-95 transition-transform">
                    去完成
                </button>
</div>
</div>
</main>
<!-- Lower Navigation / Shortcuts -->
<section class="px-6 mt-12 grid grid-cols-2 gap-3">
<div class="bg-[#FFEDD5] p-6 rounded-[32px] flex flex-col items-center justify-center text-center gap-3 active:scale-95 transition-transform border-b-8 border-[#FED7AA]">
<div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-4xl text-secondary" style="font-variation-settings: 'FILL' 1;">redeem</span>
</div>
<span class="font-headline font-black text-xl text-on-secondary-container">我的奖励</span>
</div>
<div class="bg-[#E0F2FE] p-6 rounded-[32px] flex flex-col items-center justify-center text-center gap-3 active:scale-95 transition-transform border-b-8 border-[#BAE6FD]">
<div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">list_alt</span>
</div>
<span class="font-headline font-black text-xl text-on-primary-container">积分明细</span>
</div>
<div class="bg-[#F5F3FF] p-4 rounded-[28px] flex flex-col items-center justify-center text-center gap-3 active:scale-95 transition-transform border-b-8 border-[#DDD6FE]">
<div class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-3xl text-purple-600" style="font-variation-settings: 'FILL' 1;">fact_check</span>
</div>
<span class="font-headline font-black text-lg text-purple-900">我的审核</span>
</div></section>
<!-- Bottom Action Button (Large) -->
<div class="px-6 mt-10">
<button class="w-full h-20 bg-secondary-container rounded-full text-white font-black text-2xl flex items-center justify-center gap-4 shadow-xl active:scale-90 transition-all border-b-[6px] border-[#E67E00]">
<span class="material-symbols-outlined text-4xl">add_task</span>
            添加新愿望
        </button>
</div>
<!-- Floating Decoration -->
<div class="fixed -bottom-10 -left-10 w-40 h-40 bg-tertiary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-10 -right-10 w-40 h-40 bg-secondary-container/10 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
